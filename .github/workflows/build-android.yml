name: Fast Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # 🚀 Caches Gradle dependencies for faster subsequent runs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # 🚀 Caches Node modules

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Android Native Code (Expo Prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Build APK (Fast/Single Architecture)
        run: |
          cd android
          # 🚀 The magic flag: only build for modern 64-bit ARM devices
          ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a

      - name: List Build Outputs (Debug - just in case)
        if: always()
        run: find android/app/build/outputs/apk -name "*.apk"

      - name: Upload APK to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: NuvioMobile-FastBuild-APK
          # 🚀 '**' recursively searches all folders just in case Gradle puts it in a subfolder
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
